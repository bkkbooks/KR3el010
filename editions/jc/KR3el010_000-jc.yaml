芥子乳香沒藥共為末雞子清調敷腰上損方杜仲二錢牛膝一錢五分破故紙骨碎補生地質汗青木香烏藥乳香沒藥當歸威靈仙各一錢二分小茴蛇床子各八分羌活獨活各六分肉桂五分地鱉蟲五個腰虛自痛除地鱉蟲獨活加熟地一錢草烏散治跌損腰痛川烏草烏生用骨碎補陳皮乳香沒藥各等分杉木節七個酒炙共為末調服一二錢手上加穿山甲細辛桂枝威靈仙左手加柴胡木香用酒服腰痛肚脹方羌活青皮烏藥五靈脂大茴杜仲檳榔紅花桃仁莊黃甘草大便不通加大黃朴硝荔枝核小便不通加車前木通川楝子鐵馬鞭騎當穴傷當歸白芍乳香沒藥元胡黃耆升麻熟附小茴茯苓茯神血竭沉香甘草紅棗三枚引攔馬穴傷歸尾丹皮各五錢五加皮苡仁川牛膝淮牛膝各七錢參三七稜麻各二錢肉桂一錢共為末酒下鳳尾穴傷腰眼痛極大便不通必定打斷鳳翅積血有餘服後方桑寄生合夕風半夏破故紙五加皮紅花穿山甲乳香沒藥甘草各一錢乾葛木通各八分肉桂地鱉蟲六個虎骨一錢二分升麻四分五龍草一把藕節引酒燉服外用敷藥方乳香沒藥紅曲地鱉蟲麻根五龍草加蔥姜共搗爛用糯米飯敷上腎俞穴傷脊背第十五椎命門之下生地一錢破故紙天仙子烏藥各一錢二分黃柏牡蠣元胡索小茴澤蘭紅花紫草蘇木乳香木香杜仲各八分不加引水煎服氣海穴傷在關元上赤芍歸尾紅花破故紙牛膝紅硝紅曲紫草劉寄奴肉桂甘草杉木皮引酒煎服關元穴傷小腸穴歸尾赤苓參三七澤瀉廣木香梔仁自然銅肉桂車前桃仁三稜莪朮甘草燈心引酒煎服命關穴傷麝香肉桂參三七牡蠣青皮木香白朮各三錢細辛二錢甘草五分膀胱穴傷肚膨不消小便不通服此車前一錢五分豬苓澤瀉檳榔小茴桔梗陳皮青皮杜仲桑寄生半夏良薑甘草各一錢莊黃八分燈心生薑引水燉服天樞穴傷大腸穴莊黃桃仁生地劉寄奴羌活稜麻防風巴戟乳香沒藥甘草生薑引酒煎服又方桃仁千金子大黃蜣螂共為末酒煎服糞門穴傷歸尾莊黃五味獨活參三七肉桂五靈脂生地甘草共為末酒下封門穴傷此下竅也傷重昏倒要拿活服七葉一枝花後用藥破故紙桔梗丹皮紅花木通木瓜參三七大茴獨活乳香沒藥甘草各一錢肉桂八分茯苓一錢五分灶心土引酒燉服再用後藥活石硃砂人中白各八分龍骨烏藥棗皮茯神蓮鬚秦艽茯苓甘草各一錢續斷紫荊皮各一錢二分厚朴六分建蓮七枚引水燉服頸項打斷用高椅坐定雙手揉上先服全身丹後服紅藥蒸雞肝童便酒調吞服頸項骨跌斷用雙手端定耳門抬住上掇先服人參湯後服紅藥腰骨腰眼棍打傷者不治拳傷可治糞骨打傷用全身丹藕節煎湯送下如不止再用紅藥一分雞湯送下即愈腿足門第五安步以當車樂哉子皮有足疾限於天也下堂而傷咎在人事矣跛而登者豈獨貽婦人之笑輯腿足門膝彎受傷生地蘇梗桂枝小茴細辛西香茜草草烏甘草共為末蔥引酒下膝蓋受傷先移掇後用藥五加皮五爪龍梔子仁三十五個共為末酒調敷後服藥獨腳蓮即鬼臼過江龍五加皮地鱉蟲牛膝木通紅花蒼朮砂仁稜麻升麻甘草茄根引酒燉服膝眼受傷地鱉蟲梔子紅曲乳香沒藥各一錢胡椒六分蔥姜共搗爛敷上杉皮夾定後服藥當歸生地沒藥虎骨腳樟南蛇五加皮牛膝獨活木瓜一方無獨活吊筋受傷當歸一錢五分生地腳樟牛膝木瓜檀香骨碎補劉寄奴南蛇紅花木通降香乳香合夕風甘草各一錢茄根引酒燉服內廉二穴牛膝木瓜苡仁五加皮廣皮羌活青皮丹皮桂枝紅花白芍各五錢馬鞭草引酒下太衝鞋帶二穴檳榔赤芍腳樟牛膝乳香澤蘭稜麻桂枝鐵砂甘草酒煎空心服螺絲骨傷苡仁南星枳殼牛膝木瓜五加皮骨碎補半夏香附陳皮青皮元胡索歸尾赤芍桃仁羊花即羊躑躅棕樹招甘草各一錢烏藥五分肉桂三分酒燉服腳跟受傷腫者不宜動針只用敷藥紅花川烏乳香沒藥蔥姜肥皂同搗爛敷又服後方升麻元胡索當歸蘇木紅花腳樟威靈仙沒藥五加皮烏藥血竭牛蒡子牛膝木通藕節引酒燉服又方血竭虎骨參三七牛膝黃柏麝香羌活木香丁香地鱉蟲歸尾純麻活血丹碎骨丹二丹另用水煎同藥對服共為末酒對服如人虛加鹿筋寒氣在身加肉桂另放酒內腫加大黃芒硝氣不和加寄生廣皮骨斷加猴骨血紫加桃仁紅花痛加乳香沒藥杜仲故紙若不煩躁須減黃柏衝陽穴傷腳背也白芨根川芎木瓜檳榔乳香甘草歸尾澤蘭青木香鐵砂不加引側足穴傷淮膝歸尾莊黃木通五味子參三七細辛車前子白芷紅花甘草馬鞭草引酒下湧泉穴傷腳底心牛膝木瓜苡仁五加皮丹皮青皮莊黃歸尾硼砂車前子細辛獨活羌活共為末酒下八分大腿打落兩人扶定將手扣定抱膝一揉然後掇上先服全身丹後用藥金創門第六杖傷附函人唯傷人乃仁術也軍中固多備用北俗人皆佩刀睚眥之怨抽刃而起其賴有此與輯金創門金創降真散降真香用節松香文蛤各等分為末摻傷處夾縛定神效金創灰蛋散石灰細研雞蛋清和灰成餅煅過候冷研細遇傷摻之神效佛手散治金槍重傷筋骨斷折將死者鹿茸當歸蓯蓉禹餘糧菟絲餅桑螵蛸紫石英熟地白芍川芎乾薑覆盆子酸棗仁五味子琥珀茯苓各等分共為末姜三片棗一枚引軍中第一仙方生狗頭一個將肉刮盡文火煅存性為末指甲灰血餘灰各一錢陳松香五錢共為末摻傷處斷骨即續刀傷即愈以四味等分用酒調服亦可金創迎刃散治傷重出血不止白芷甘草水龍骨各一兩共為末文武火炒赤色為度用嫩苧葉韭菜取自然汁調前末陰乾入參三七血竭南星牛膽各一兩片腦三錢野苧五錢傷處擦上即愈住痛生肌止血方韭菜根二兩未毛鼠二個嫩石灰二兩同放石臼內搗爛作餅陰乾為度用時以刀刮末敷傷處布裹即愈治刀斧傷止血定痛生肌降真香挫碎炒存性五倍子微炒血餘炭各等分為末摻之將干箬葉護住用軟棉扎定兩日一換愈又方赤石脂象皮棕衣血餘舊氈帽松香各五錢兒茶龍骨乳香沒藥白礬丁香各三錢硃砂琥珀參三七七釐散甘石黃丹半夏冰片各一錢地鱉蟲八錢共研極細末刀口見血方生半夏南星白芷研末用生肌散治刀斧傷成瘡膿水難乾肌肉不生此方神效五倍子爐甘石兒茶龍膾皮各等分為末瓷器貯用洗方防風荊芥甘草共煎湯無風處洗英雄丸乳香沒藥自然銅地龍地鱉蟲密陀僧花椒各八分研末蜜丸酒服臨打時不覺疼血不侵心甚妙棍傷髀骨茯神花粉各一錢二分靈砂龍骨丹皮紅花自然銅川烏腳樟獨活牛蒡子乳香沒藥甘草各一錢木香六分桃仁七粒酒煎服再用敷藥花椒一錢梔仁十個地鱉蟲五個酒藥七個麝香一分蔥地蚯蚓五分共搗爛麻油調敷再服後藥當歸生地乳香沒藥石耳柏葉各一錢五分血竭人中白參三七硃砂木香云皮紫草茸自然銅各一錢猴骨五分七釐散共為末肉湯化服之即愈金創傷摻法松香白礬為末摻半夏六錢白礬四錢為末摻細石灰韭汁作餅貼壁上陰乾為末摻石灰同生大黃片炒桃紅色去大黃名桃花散摻之俱效通用門第七療折傷方藥習拳技家多有之武夫當場往往制以待用而秘不示人何其私也濟世婆心老而未艾輯通用門八寶丹珍珠豆腐煮滑石各一錢爐甘石二錢薄荷水煮火煅硼砂八分乳香蒙薺粉各一錢疑是荸薺粉七釐散歸尾紅花桃仁大黃酒浸自然銅醋煅七次各一錢麝香五分共為末每服大人一錢二分小兒七釐陳酒送下汗出為度觀音針方麝香一錢冰片五分硫黃二錢先將硫黃煅化再將冰麝入內取起存冷為度但有久損並核子用此針即愈蓮葉散治瘀血腹脹用蓮葉不拘多少炒存性研末童便調一二服大便下瘀血愈若身弱氣虛用八珍湯加骨碎補續斷服仙傳火龍行氣散生薑食鹽麻油各四兩大黃牙硝各二兩頭油渣疑是豆油渣荊芥澤蘭瑞香草葉各三兩共搗爛以麻油炒熱頻頻熨上自愈萬金不換乳香尋痛散治遠年諸般傷損遍身疼痛神效乳香沒藥血竭甘草羌活獨活茴香木香沉香草烏當歸川芎白芷各一兩花粉木瓜肉桂各七錢共為末每服二錢熱酒送下刀斧損傷破傷風方白芷獨活荊芥防風當歸乳香沒藥蒼耳子甘草桃仁一個為引水煎酒對服打死無氣方白芍桑皮葶藶子桔梗各一錢澤蘭橙葉各二錢枳殼八分連翹菖蒲辰砂各五分牙皂四分麝香三分細辛二分用酒炒過三次胎髮一撮燒存性和藥研末開水調服以手捫其口藥下一時可愈萬應膏羌活獨活荊芥防風黃柏白芷赤芍梔子川芎當歸細辛連翹木鱉甘草蘇木紅花元參升麻松節地榆白芨白芡半夏木瓜薄荷生地白菊降香知母貝母殭蠶骨皮苦參麻黃蟬蛻牙皂枳殼白朮云皮黃耆豬苓澤瀉牛膝木通良薑秦艽淮藥艾葉故紙炮姜牽牛靈仙杏仁木賊車前劉寄奴續斷烏藥陳皮槐花香附砂仁牛蒡遠志三稜木香天冬麥冬山柰芫花大戟骨碎補山豆根菖蒲桂枝蒼朮萆薢花粉海桐皮青皮阿膠桔梗黃芩大黃薑黃全蠍白礬各一兩血餘蘇葉黃丹水粉各二兩生肌散乳香沒藥血竭雄黃蒲黃梧子赤石脂白芷朴硝寒水石陀僧龍骨輕粉花蕊石山甲螃蟹粉硼砂蟾酥各五錢硃砂烏藥各三錢共為末每膏一張各下數分貼傷處若臁瘡厲症再入麝香二三分貼背心即安跌損妙方書後彥之先生癸巳夏折左肱南行求治得跌損妙方一編由是小愈今秋重加校訂欲付梓而難其資就商於余余讀之用藥平穩立法精詳洵醫林中僅見之作可補靈素以來所未備程子云一介之士苟存心於利物於人必有有濟先生之謂與爰助其刊資並綴數言於後道光丙申九月同學愚弟胡泉謹跋彥之先生刻跌損妙方成漫題長句一首即壽其六十生辰身是精金百煉余年華六十再生初籌添甲子周迴日著到軒岐未有書世上風波經解脫日諷金剛經胸中塊壘酒消除壽人自壽真無量珍重青囊萬寶儲歲在柔兆涒灘塗月佛日姻愚弟劉寶楠拜撰
