body:
  text: 治法總論夫跌打損傷氣血不流行或人事昏沉往來寒熱或日輕夜重變作多端昧者不審原因妄投猛劑枉死多人誠可惜也治宜及早半月後才醫瘀血已固水道不通難為力矣既表不可復表要仔細看明隨輕重用藥青腫轉紅色血活將愈若牙關緊閉不能進藥萬無生理坐臥避風忌一切生冷牛肉縮筋豬肉發病亦不宜食遇有重傷解衣諦視偏身血道形色若何診脈調和與否脈絕不至者死沉細者生山根好陰囊有子可治腎子入小腹無治頂門一破骨陷難存囟門被傷髓出即死心胸緊痛青色勝裹心乃偏心受傷可治紅色勝裹心乃心口受傷不治上心口青腫一七即死傷小腹而不及肚可治若陰陽不分糞下不止氣出不收則肚傷矣食管雖斷在飽食之後延二日不死者可治若鼻孔黑色舌大神昏則臟腑絕矣耳後為制命之處脊骨無續斷之方男子乳傷猶非重症婦人乳傷卻是危機正腰受傷笑者多凶小腹受傷孕婦最忌以上姑述其大者並列各方於下用藥歌歸尾兼生地檳榔赤芍宜四味堪為主加減任遷移乳香並沒藥骨碎以補之頭上加羌活防風白芷隨胸中加枳殼枳實又云皮腕下用桔梗菖蒲厚朴治背上用烏藥靈仙妙可施兩手要續斷五加連桂枝兩脅柴胡進膽草紫荊醫大茴與故紙杜仲入腰支小茴與木香肚痛不須疑大便若阻隔大黃枳實推小便如閉塞車前木通提假使實見腫澤蘭效最奇倘然傷一腿牛膝木瓜知全身有丹方飲酒貴滿卮苧麻燒存性桃仁何累累紅花少不得血竭也難離此方真是好編成一首詩庸流不肯傳無乃心有私血頭行走穴道歌周身之血有一頭日夜行走不停留遇時遇穴若傷損一七不治命要休子時走往心窩穴丑時須向泉井求井口是寅山根卯辰到天心已鳳頭午時卻與中原會左右蟾宮分在未鳳尾屬申屈井酉丹腎俱為戌時位六宮直等亥時來不教亂縛斯為貴左右論凡受傷不知左右若有吐血症見血自明血黑者左受傷血鮮者右受傷若無血吐出即看眼珠亦可知其定所烏珠包醜者傷在左白珠包醜又加紅大者傷在右左屬肝右屬肺烏珠屬肝白睛屬肺瞳仁屬腎常見右邊受傷發時左邊便痛不可單治一邊必左右兼治其病始愈藥中禁忌乳香沒藥二味方中屢用務要去油若不去油恐其再發小兒骨一味方中亦間用之余謂小兒何辜甫離母腹骨化形銷以人治人殘忍殊甚大造丸有紫河車張景岳以為戕厥子之先天勸人少用況兒骨乎余輯諸方見有用此者悉行裁去以猴骨代之穴名藥名靈樞經脈篇言穴名甚詳徐氏滑氏皆有歌訣滑氏十四經發揮圖與注益明是編間取新奇出靈素之外未知何本瀕湖李氏本草綱目一千六百餘種備矣異名同物一一註明其有未收者散見編內仍依原本載入俟考以下方藥計分七門全身門第一父母全而生子子全而歸之可謂孝矣身體毀傷何全之有然醫治得宜不全者仍底於全是亦不失為孝也輯全身門全身門用藥上部湯藥方當歸川芎赤芍生地羌活獨活丹皮黃芩桔梗桂枝澤蘭桃仁檳榔生薑引水煎酒對服中部湯藥方歸尾赤芍生地羌活丹皮桃仁紫荊皮蘇木蘇梗西香大茴小茴杜仲紅花有紅不用兒茶元胡草烏少用水煎酒對服下部湯藥方歸尾赤芍生地羌活獨活丹皮桃仁紫荊皮黃芩西香木香木瓜苡仁骨碎補防己川茗牛膝參三七甜瓜皮南星水煎酒對服全身跌打丹當歸川芎白芍陳皮茯苓半夏山藥澤瀉羌活獨活荊芥防風細辛白芷青皮枳殼山楂神麯檳榔大黃黃柏小茴大茴西香木香麝香元胡木瓜甜瓜皮乾薑杜仲續斷骨碎補虎骨猴骨乳香沒藥參三七甘草自然銅烏藥川烏草烏血竭地鱉蟲硃砂琥珀穿山甲花粉苡仁車前子木通狗脊菖蒲南藤即風藤亦名丁公藤兒茶秦艽紅花五爪龍即烏蘞莓俗名五葉藤尋骨風赤芍以上各等分為末全身跌打方當歸虎骨猴骨參三七白芷烏藥山羊血桃仁木香母丁香茜草以上一兩乳香沒藥以上八錢赤芍血竭牛膝菖蒲木通五加皮小茴杞子元參五靈脂南蛇薄荷尋骨風以上五錢川芎澤瀉肉桂桂皮藁本鬱金蔓荊子麝香以上三錢荊芥羌活升麻枳殼花粉杜仲木瓜細辛檳榔桂枝兒茶厚朴破故紙三稜自然銅草烏以上二錢地鱉蟲四十九個共為末酒對服南蛇即蚺蛇生嶺南全身酒藥方當歸木瓜虎骨杜仲菟絲子破故紙杞子牛膝以上一兩乳香沒藥以上八錢白芍山藥丹皮麥冬桂枝知母元胡川芎紫荊皮丁香威靈仙以上五錢甜瓜皮陳皮兒茶獨活參三七烏藥以上三錢硃砂西香各二錢地鱉蟲五個血竭七錢共為末放瓶內入好酒十斤煮三炷香窨七日每服一杯佛手散當歸生地川芎白芍荊芥防風鉤藤大茴木瓜五加皮白芷紫荊皮羌活檳榔杜仲故紙五靈脂威靈仙乳香沒藥烏藥自然銅牛膝南星共為散用好酒一罈絹袋盛浸三五日隨量飲不拘時七日見功大寶紅藥方琥珀血竭各四錢金粉一錢硃砂五錢共為末每服八分五虎紅藥神仙丹猴骨兒胎麵包火煅鹿胎血竭琥珀各五錢人參一錢自然銅三錢共為末損傷十分服此藥八分神效回生再造飲接骨藥也如骨未斷勿輕服五銖錢五文火煅七次木香自然銅各一錢麝香一分共為細末每服一錢無灰酒送下先嚼丁香一粒方進此藥傷在上飯後服傷在下飯前服返魂奪命丹牙關緊閉不省人事撬開灌入銀絲草一兩即山橄葉長白毛者佳小雞一隻過一月者不去毛二味共搗爛如洗熱酒沖和布濾過調猴骨末二錢服過再用稜莪散一劑稜莪散三稜莪朮赤芍黃柏各一兩大茴元胡檳榔紫蘇陳皮各八錢青皮羌活腹皮各五錢荊芥桔梗半夏黃連各二錢芒硝大黃防風柴胡各一錢千里馬即草鞋二隻姜三片蔥一根童便水各半煎空心熱服隨症加減若手足傷斷徐徐推正燈芯火紙卷令厚實杉木皮緊扎自愈回生續命丹治筋骨斷折疼痛不止川烏草烏自然銅各二兩地龍烏藥青皮禹餘糧醋淬各四錢共為細末每用二錢再生活血止痛散大黃紅花各五錢當歸柴胡各二錢花粉穿山甲各一錢桃仁五十粒甘草八分水酒各半煎空心熱服神效接骨奇方當歸白芷草烏各三錢生用為末先酒調服二錢一覺麻揣正骨斷處糯米粥牡蠣粉調塗患處乳香沒藥當歸白芍川椒各五錢自然銅二錢共研細末黃蠟二兩熔化入前末攪勻作丸酒服數次接骨丹自然銅五錢當歸川芎羌活獨活虎膏五靈脂乳香沒藥杜仲木瓜茯苓芡實棗仁杏仁川烏白蠟苡仁細辛神麯牙皂烏藥硃砂西香木香灶雞即灶馬俗名灶蟀地骨皮地鱉蟲甘草各三錢紅蚯蚓抱雞各三個大皂推車子各一錢即蜣螂共為細末每服一錢酒下七將擒拿方地鱉蟲銀硃硃砂銀粉骨碎補接骨蟲白蠟各八分共為細末滋榮雙解散治氣血虛受風寒當歸川芎白芷元胡索沒藥川烏自然銅石蓮肉活血通經止痛散治血衝心氣緊急三稜莪朮黃柏黃連青皮赤芍紫蘇香附柴胡乳香紅花蘇木菖蒲千里馬吐血不止方當歸茯苓芡實各一兩五錢肉桂棗仁白朮白芍澤瀉陳皮遠志柴胡各一兩山藥二兩砂仁熟附各五錢共為細末酒服初起方歸尾川芎白芍香附丁香木香紅花蘇木桂枝白芷甜瓜皮桑白皮牛膝獨活苡仁青皮棗肉菟絲子枸杞子西香血竭甘草各等分童便引水煎服乳香尋痛散治遠年損傷遍身疼痛乳香沒藥木香沉香肉桂草烏各五錢花粉木瓜羌活獨活小茴甘草各七錢當歸川芎白芷血竭各一兩共為末每服二錢熱酒送下敷藥方秦艽川椒蔥葉各一兩肉桂雞心瓣五錢生薑二錢共研爛砂糖調敷立效洗藥方半夏川烏草烏乳香沒藥骨碎補各一兩白芨白芷黃柏七釐散尋骨風蛇蛻千年健陳石灰各五錢用燒酒煎洗末藥方狗脊骨碎補蘇木各一兩千年健過江龍青木香尋骨風檳榔紅花三稜莪朮漆渣各五錢枳殼八錢烏藥二兩參三七花乳石各二錢馬前子二十個桃仁十四粒共為末脅下加柴胡膽草青皮細辛牙皂桔梗腳上加半夏手上加桂枝腰加杜仲破故紙未過四十者加乳香沒藥骨碎補烏藥羌活防風檳榔紅棗肉上四十者加熟地白芍茯苓甘草澤瀉山藥棗皮遠志黃耆當門吹鼻丹麝香冰片金粉銀粉硃砂明礬牙皂細辛槍硝各三錢金箔銀箔各二兩金不換葉一兩共為細末每吹八分此藥入鼻如不轉氣將紅藥與服用手在眼角上一揉片時自轉金不換即參三七婦人跌損方當歸川芎生地白芍益母草紅花杜仲白朮牛膝羌活獨活黃芩黃耆香附烏藥茯苓續斷虎骨南星胡水沙各等分用酒煎服凡跌打骨斷痛不可忍急拾往來便溺牆下瓦片洗淨火煅醋淬五七次研極細末酒服三錢痛在上飯後服在下空心服此藥極能理損續筋接骨屢有神效又方將糞窖內多年瓦片洗淨醋煅九次研細末每末一兩加五加皮男子發灰各五錢醋調一歲一分好酒送下再用竹四片竹青向內夾定患處勿動若皮破者勿用摻藥又方用母雞一隻約重一斤殺後連毛骨剁爛如泥再將雞血和入再剁敷患處綢包緊三日自愈凡閃挫時即於無風處將紙捻觸鼻內用力打噴嚏二三十則氣升而痛止再用胡桃肉搗爛傾熱酒內儘量一醉而愈或急尋地鱉蟲炙脆為末酒調服骨節跌脫用生蟹搗汁熱酒沖服數杯以蟹渣塗患處半日間簌簌有聲脫處自合又方燒灰酒對亦佳頭面門第二頭居一身之上五官位焉若喪其元豈不有靦依方服之還汝廬山真面輯頭面門頭破腫痛發熱歸尾川芎生地赤芍防風白芷蔓荊子羌活連翹花粉各一錢五分甘草一錢如血出過多昏迷不醒倍加芎歸水煎服頭破傷風腫大先服紅藥用雞肝飯上蒸熟酒調後服回生丹肉桂自然銅當歸白芷防風升麻花粉大茴羌活甘草水煎酒對服百會穴傷腦頂也金沙銀沙自然銅參三七血竭各一錢山羊血如無以地鱉蟲代之甘草五分虎骨桔梗人中白各一錢五分燈心引水酒對煎又方人參地鱉蟲地龍當歸升麻白芷自然銅水煎服腦門受傷血瘀七孔雞湯洗淨將馬蹄子調敷後用八寶丹硃砂瑪瑙龍骨象皮鹿角膠地鱉蟲白蠟乳香沒藥若無血水用人乳調敷即愈囟門穴傷天麻白芷藁本羌活木香青皮骨碎補赤芍紅花川烏甘草共為末蔥引酒下五分太陽太陰穴傷血竄兩目暈死先服七釐散猴骨硃砂參三七琥珀自然銅各二錢人中白沉香紅花乳香沒藥山羊血各一錢共為末好酒送服外用八寶丹點眼太陽三麼穴歸尾桃仁莊黃杜仲破故紙青皮羌活獨活肉桂功勞章子千里馬姜引酒燉服太陰三星穴三稜莪朮肉桂參三七蘇子元胡萊菔子木香茜草乳香沒藥地鱉蟲甘草不加引水煎服開空穴傷兩耳也威靈仙當歸山藥木通虎茨各一錢五分茯苓腳樟各二錢大腹皮甘草各一錢木香八分童便引酒燉服喬空穴傷耳後根也天麻藁本白芷羌活荊芥麝香血竭紅花甘草共為末酒下五分左眉尖穴五加皮桂枝柴胡龍膽草陳皮荊芥薄荷甘草共為末酒下右眉尖穴五加皮桂枝柴胡龍膽草細辛五味威靈仙木香麝香共為末酒下眼角穴傷眼梢也當歸茯苓川芎茜草地鱉蟲各五錢川烏三錢青木香二錢肉桂甘草各一錢參三七五分共為末酒下三分眼角左右方天麻白芷柴胡桔梗川芎獨活兒茶各一錢三稜莪朮各二錢甘草五分共為末酒下大中穴傷鼻中也香附紅花桂皮蘇梗澤蘭半夏升麻白芷陳皮甘草蔥引酒燉服天平穴傷大中穴之上此穴斷不治硃砂七分砂仁六分石乳枳殼各一錢童便引酒對服駕梁穴傷鼻梁也當歸生地川芎白芍尋骨風天麻白芷肉桂參三七甘草共為末酒下蔥引山根穴傷鼻梁之上當歸生地川芎細辛白芷茯苓虎骨陳